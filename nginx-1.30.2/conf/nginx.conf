worker_processes 1;

events {
    worker_connections 1024;
}

http {

    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        # ----------------------------------------------------
        # FRONTEND (Vite / React sur le port 5173)
        # ----------------------------------------------------
        location / {
            proxy_pass http://127.0.0.1:5173;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;   # Requis pour les WebSockets de Vite
            proxy_set_header Connection 'upgrade';    # Requis pour les WebSockets de Vite
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ----------------------------------------------------
        # BACKEND (NestJS sur le port 3000)
        # ----------------------------------------------------
        location /api/ {
            # Le "/" à la fin supprime le préfixe "/api/" lors de la redirection vers NestJS.
            # Exemple: http://localhost/api/users -> http://127.0.0.1:3000/users
            proxy_pass http://127.0.0.1:3000/; 

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }
}